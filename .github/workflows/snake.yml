name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate purple snake animation SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23A855F7&color_dots=%23261a3d,%233d2a5c,%236b3fa0,%239d4edd,%23c77dff
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23A855F7&color_dots=%23261a3d,%233d2a5c,%236b3fa0,%239d4edd,%23c77dff&palette=github-dark

      - name: Push snake output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
